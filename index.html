<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbound Scanner</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #fcfcfc;
      display: flex;
      justify-content: center;
      padding: 20px;
      margin: 0;
    }
    .container {
      width: 100%;
      max-width: 450px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    label {
      font-size: 1.1rem;
      margin-bottom: 5px;
      color: #000;
    }
    input {
      width: 100%;
      padding: 15px;
      background-color: #9e9e9e; /* Warna abu-abu sesuai referensi */
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 1rem;
      text-align: center;
      box-sizing: border-box;
    }
    input::placeholder {
      color: #e0e0e0;
    }
    input:focus {
      outline: 2px solid #666;
    }
    .row-2 {
      display: flex;
      gap: 15px;
      width: 100%;
    }
    .row-2 .form-group {
      flex: 1;
    }
    .barcode-group {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      width: 100%;
    }
    .barcode-group input {
      border-radius: 20px; /* Sesuai gambar, input barcode lebih membulat */
    }
    .camera-btn {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      color: #000;
      white-space: nowrap;
    }
    .camera-btn:hover {
      text-decoration: underline;
    }
    button.action-btn {
      width: 100%;
      padding: 15px;
      background-color: #9e9e9e;
      border: none;
      color: #000;
      font-size: 1.1rem;
      cursor: pointer;
      border-radius: 4px;
      transition: background-color 0.2s;
    }
    button.action-btn:hover {
      background-color: #888;
    }
    button.action-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="form-group">
      <label>BARCODE</label>
      <div class="barcode-group">
        <input type="text" id="barcode" placeholder="" oninput="lookupSKU(this.value)">
        <button class="camera-btn" onclick="openCamera()">
          📷 logo camera
        </button>
      </div>
    </div>

    <div class="form-group">
      <input type="text" id="sku" placeholder="SKU PRODUK HASIL DARI BARCODE" readonly style="background-color: #8e8e8e;">
    </div>

    <div class="row-2">
      <div class="form-group">
        <label>TANGGAL EXP</label>
        <input type="date" id="expDate">
      </div>
      <div class="form-group">
        <label>QTY</label>
        <input type="number" id="qty" placeholder="INPUT QTY">
      </div>
    </div>

    <div class="form-group">
      <label>Checked by</label>
      <input type="text" id="checkedBy" placeholder="INPUT NAMA">
    </div>

    <div style="margin-top: 10px;">
      <button class="action-btn" id="btnSimpan" onclick="simpanData()">SIMPAN</button>
    </div>
    
    <div style="margin-top: 20px;">
      <button class="action-btn" onclick="requestUpdate()">REQUEST UPDATE DATA</button>
    </div>

  </div>

  <script>
    // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT DI SINI
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyFnAt_k_cKbY0lHxyDAHnxxLHdpzCGDDTmz99BLhOa3y3B7do9XOHflh3qPjbo9z2mRQ/exec';

    // Ambil data "Checked By" dari Local Storage jika ada (mencegah ketik ulang saat refresh)
    window.onload = function() {
      const savedName = localStorage.getItem('inbound_checker_name');
      if(savedName) document.getElementById('checkedBy').value = savedName;
    }

    // Fungsi dummy untuk pencarian SKU (Bisa dikembangkan dengan fetch doGet ke GAS)
    function lookupSKU(barcode) {
      const skuInput = document.getElementById('sku');
      if(barcode.length > 5) {
        // Logika mapping SKU. Untuk saat ini hanya dummy teks.
        skuInput.value = "SKU-" + barcode.toUpperCase();
      } else {
        skuInput.value = "";
      }
    }

    // Placeholder untuk integrasi library scanner (misal: html5-qrcode)
    function openCamera() {
      alert("Integrasi kamera dapat menggunakan library html5-qrcode.");
      // Di sini Anda bisa trigger modal yang berisi div reader kamera
    }

    // Fungsi Submit Data ke GAS
    async function simpanData() {
      const barcode = document.getElementById('barcode').value;
      const sku = document.getElementById('sku').value;
      const expDate = document.getElementById('expDate').value;
      const qty = document.getElementById('qty').value;
      const checkedBy = document.getElementById('checkedBy').value;

      if(!barcode || !qty || !checkedBy) {
        alert("Barcode, QTY, dan Checked By wajib diisi!");
        return;
      }

      // Simpan nama checker ke Local Storage
      localStorage.setItem('inbound_checker_name', checkedBy);

      const payload = {
        barcode: barcode,
        sku: sku,
        expDate: expDate,
        qty: qty,
        checkedBy: checkedBy
      };

      const btn = document.getElementById('btnSimpan');
      btn.innerText = "MENYIMPAN...";
      btn.disabled = true;

      try {
        // Menggunakan text/plain untuk menghindari CORS preflight request pada GitHub Pages
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8', 
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if(result.status === "success") {
          // Reset form setelah sukses (kecuali nama checker)
          document.getElementById('barcode').value = '';
          document.getElementById('sku').value = '';
          document.getElementById('expDate').value = '';
          document.getElementById('qty').value = '';
          document.getElementById('barcode').focus(); // Otomatis fokus ke barcode lagi
        } else {
          alert("Gagal menyimpan data: " + result.message);
        }
      } catch (error) {
        alert("Terjadi kesalahan koneksi.");
        console.error(error);
      } finally {
        btn.innerText = "SIMPAN";
        btn.disabled = false;
      }
    }

    function requestUpdate() {
      // Logika untuk sinkronisasi / update database SKU offline
      alert("Tombol Request Update diklik.");
    }
  </script>
</body>
</html>
