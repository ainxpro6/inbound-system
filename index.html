<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Inbound Scanner</title>
  
  <script src="https://cdn.jsdelivr.net/npm/rolldate@3.1.3/rolldate.min.js"></script>

  <style>
    /* Mengatur Tema Gelap (Dark Theme) */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1e1e20; /* Warna background gelap */
      color: #ffffff;
      display: flex;
      justify-content: center;
      padding: 30px 20px;
      margin: 0;
    }

    .container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    label {
      font-size: 1rem;
      margin-bottom: 8px;
      color: #ffffff;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 14px;
      background-color: #55585f; /* Warna input abu-abu */
      border: none;
      border-radius: 8px; /* Sudut membulat */
      color: #ffffff;
      font-size: 1rem;
      text-align: center;
      box-sizing: border-box;
      outline: none;
    }

    input::placeholder {
      color: #b0b0b0;
    }

    input:focus {
      outline: 2px solid #888a8f;
    }

    /* Baris khusus untuk Barcode & Kamera */
    .barcode-group {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 15px;
      width: 100%;
    }

    .barcode-group input {
      border-radius: 20px; /* Lebih membulat khusus barcode */
      flex: 1;
    }

    .camera-btn {
      background: none;
      border: none;
      font-size: 1.8rem; /* Ukuran icon diperbesar */
      cursor: pointer;
      color: #a0a0a5;
      padding: 0;
      display: flex;
      align-items: center;
      transition: transform 0.2s;
    }

    .camera-btn:hover {
      transform: scale(1.1);
      color: #ffffff;
    }

    /* Baris khusus Tanggal & QTY agar sejajar */
    .row-2 {
      display: flex;
      gap: 15px;
      width: 100%;
    }

    .row-2 .form-group {
      flex: 1;
    }

    /* Input khusus yang readonly (SKU & Date Picker) */
    .readonly-input {
      background-color: #55585f;
      cursor: pointer;
    }

    /* Tombol Aksi */
    button.action-btn {
      width: 100%;
      padding: 14px;
      background-color: #55585f;
      border: none;
      color: #ffffff;
      font-size: 1.1rem;
      cursor: pointer;
      border-radius: 8px;
      transition: background-color 0.2s, opacity 0.2s;
      margin-top: 5px;
    }

    button.action-btn:hover {
      background-color: #6a6d75;
    }

    button.action-btn:active {
      opacity: 0.8;
    }

    button.action-btn:disabled {
      background-color: #3b3d42;
      color: #7a7a7a;
      cursor: not-allowed;
    }
    
    /* Icon kalender kecil di dalam input tanggal */
    .date-wrapper {
      position: relative;
      width: 100%;
    }
    .date-wrapper::after {
      content: '📅';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div class="form-group">
      <label>BARCODE</label>
      <div class="barcode-group">
        <input type="text" id="barcode" placeholder="" oninput="lookupSKU(this.value)">
        <button class="camera-btn" onclick="openCamera()" title="Buka Kamera">📷</button>
      </div>
    </div>

    <div class="form-group">
      <input type="text" id="sku" class="readonly-input" placeholder="SKU PRODUK HASIL DARI BARCODE" readonly>
    </div>

    <div class="row-2">
      <div class="form-group">
        <label>TANGGAL EXP</label>
        <div class="date-wrapper">
          <input type="text" id="expDate" class="readonly-input" placeholder="dd/mm/yyyy" readonly>
        </div>
      </div>
      <div class="form-group">
        <label>QTY</label>
        <input type="number" id="qty" placeholder="INPUT QTY">
      </div>
    </div>

    <div class="form-group">
      <label>Checked by</label>
      <input type="text" id="checkedBy" placeholder="INPUT NAMA">
    </div>

    <div style="margin-top: 15px;">
      <button class="action-btn" id="btnSimpan" onclick="simpanData()">SIMPAN</button>
    </div>
    
    <div style="margin-top: 10px;">
      <button class="action-btn" onclick="requestUpdate()">REQUEST UPDATE DATA</button>
    </div>

  </div>

  <script>
    // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT DI SINI
    const SCRIPT_URL = 'URL_GAS_ANDA_DISINI';

    // 1. Inisialisasi Rolldate (Scroll Wheel Date Picker)
    window.onload = function() {
      new Rolldate({
        el: '#expDate',
        format: 'DD/MM/YYYY',
        beginYear: 2020,
        endYear: 2035,
        lang: {
          title: 'Pilih Tanggal Expired',
          cancel: 'Batal',
          confirm: 'Pilih',
          year: '',
          month: '',
          day: ''
        }
      });

      // 2. Ambil data "Checked By" dari Local Storage jika ada
      const savedName = localStorage.getItem('inbound_checker_name');
      if(savedName) document.getElementById('checkedBy').value = savedName;
    }

    // Fungsi dummy pencarian SKU
    function lookupSKU(barcode) {
      const skuInput = document.getElementById('sku');
      if(barcode.length > 5) {
        skuInput.value = "SKU-" + barcode.toUpperCase();
      } else {
        skuInput.value = "";
      }
    }

    // Placeholder untuk kamera
    function openCamera() {
      alert("Integrasi kamera siap ditambahkan.");
    }

    // Fungsi Submit Data
    async function simpanData() {
      const barcode = document.getElementById('barcode').value;
      const sku = document.getElementById('sku').value;
      const expDate = document.getElementById('expDate').value;
      const qty = document.getElementById('qty').value;
      const checkedBy = document.getElementById('checkedBy').value;

      if(!barcode || !qty || !checkedBy || !expDate) {
        alert("Barcode, Tanggal Exp, QTY, dan Checked By wajib diisi!");
        return;
      }

      localStorage.setItem('inbound_checker_name', checkedBy);

      const payload = {
        barcode: barcode,
        sku: sku,
        expDate: expDate,
        qty: qty,
        checkedBy: checkedBy
      };

      const btn = document.getElementById('btnSimpan');
      btn.innerText = "MENYIMPAN...";
      btn.disabled = true;

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8', 
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if(result.status === "success") {
          // Reset form (kecuali checkedBy yang nempel di local storage)
          document.getElementById('barcode').value = '';
          document.getElementById('sku').value = '';
          document.getElementById('expDate').value = '';
          document.getElementById('qty').value = '';
          document.getElementById('barcode').focus(); 
        } else {
          alert("Gagal menyimpan data: " + result.message);
        }
      } catch (error) {
        alert("Terjadi kesalahan koneksi saat mengirim data.");
        console.error(error);
      } finally {
        btn.innerText = "SIMPAN";
        btn.disabled = false;
      }
    }

    function requestUpdate() {
      alert("Proses sinkronisasi data ditarik ke GitHub Pages...");
    }
  </script>
</body>
</html>
