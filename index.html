<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Inbound Scanner</title>
  
  <style>
    /* Tema Elegan & Modern */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6; /* Background luar abu-abu sangat soft */
      color: #333333;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      margin: 0;
      min-height: 100vh;
    }

    /* Kotak Form Utama (Card Effect) */
    .container {
      width: 100%;
      max-width: 420px;
      background-color: #ffffff;
      padding: 35px 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); /* Bayangan lembut */
      display: flex;
      flex-direction: column;
      gap: 22px;
      box-sizing: border-box;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* Typografi Label */
    label {
      font-size: 0.9rem;
      margin-bottom: 8px;
      color: #1e293b;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.5px;
    }

    /* Style Input Umum */
    input {
      width: 100%;
      padding: 14px;
      background-color: #ffffff;
      border: 1.5px solid #cbd5e1; /* Border abu-abu tegas */
      border-radius: 10px;
      color: #0f172a;
      font-size: 1rem;
      font-weight: 500;
      text-align: center;
      box-sizing: border-box;
      outline: none;
      transition: all 0.3s ease;
    }

    input::placeholder {
      color: #94a3b8;
      font-weight: 400;
    }

    /* Efek Glow Biru saat kolom diklik/diisi */
    input:focus {
      border-color: #3b82f6; 
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); 
    }

    /* Baris khusus untuk Barcode & Kamera */
    .barcode-group {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
    }

    .barcode-group input {
      flex: 1;
      font-size: 1.1rem; /* Barcode sedikit lebih besar hurufnya */
      letter-spacing: 1px;
    }

    .camera-btn {
      background: none;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      color: #64748b;
      padding: 0;
      display: flex;
      align-items: center;
      transition: transform 0.2s, color 0.2s;
    }

    .camera-btn:hover {
      transform: scale(1.1);
      color: #3b82f6;
    }

    /* Baris khusus Tanggal & QTY agar sejajar */
    .row-2 {
      display: flex;
      gap: 15px;
      width: 100%;
    }

    .row-2 .form-group {
      flex: 1;
    }

    /* Input khusus yang readonly (Otomatis & Tidak bisa diedit) */
    .readonly-input {
      background-color: #f8fafc;
      border-color: #e2e8f0;
      color: #64748b;
      cursor: not-allowed;
    }
    
    .readonly-input:focus {
      border-color: #e2e8f0;
      box-shadow: none;
    }

    /* Style Tombol Aksi */
    button.action-btn {
      width: 100%;
      padding: 15px;
      background-color: #10b981; /* Warna Hijau Elegan untuk Simpan */
      border: none;
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      border-radius: 10px;
      transition: all 0.2s ease;
      margin-top: 5px;
      box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
    }

    button.action-btn:hover {
      background-color: #059669;
      transform: translateY(-1px);
      box-shadow: 0 6px 8px rgba(16, 185, 129, 0.3);
    }

    button.action-btn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 4px rgba(16, 185, 129, 0.2);
    }

    button.action-btn:disabled {
      background-color: #cbd5e1;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }

    /* Style Tombol Request Update */
    button.request-btn {
      background-color: #475569; /* Warna Slate/Abu gelap kebiruan */
      box-shadow: 0 4px 6px rgba(71, 85, 105, 0.2);
    }

    button.request-btn:hover {
      background-color: #334155;
      box-shadow: 0 6px 8px rgba(71, 85, 105, 0.3);
    }
    
    button.request-btn:active {
      box-shadow: 0 2px 4px rgba(71, 85, 105, 0.2);
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- BARCODE & CAMERA -->
    <div class="form-group">
      <label>BARCODE</label>
      <div class="barcode-group">
        <input type="text" id="barcode" placeholder="" oninput="lookupSKU(this.value)">
        <button class="camera-btn" onclick="openCamera()" title="Buka Kamera">📷</button>
      </div>
    </div>

    <!-- SKU PRODUK -->
    <div class="form-group">
      <input type="text" id="sku" class="readonly-input" placeholder="SKU PRODUK HASIL DARI BARCODE" readonly>
    </div>

    <!-- TANGGAL EXP & QTY -->
    <div class="row-2">
      <div class="form-group">
        <label>TANGGAL EXP</label>
        <input type="date" id="expDate">
      </div>
      <div class="form-group">
        <label>QTY</label>
        <input type="number" id="qty" placeholder="INPUT QTY">
      </div>
    </div>

    <!-- CHECKED BY -->
    <div class="form-group">
      <label>Checked by</label>
      <input type="text" id="checkedBy" placeholder="INPUT NAMA">
    </div>

    <!-- BUTTONS -->
    <div style="margin-top: 10px;">
      <button class="action-btn" id="btnSimpan" onclick="simpanData()">SIMPAN</button>
      <button class="action-btn request-btn" id="btnRequest" onclick="requestUpdate()" style="display: none;">REQUEST UPDATE DATA</button>
    </div>

  </div>

  <script>
    // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT DI SINI
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyFnAt_k_cKbY0lHxyDAHnxxLHdpzCGDDTmz99BLhOa3y3B7do9XOHflh3qPjbo9z2mRQ/exec';

    window.onload = function() {
      const savedName = localStorage.getItem('inbound_checker_name');
      if(savedName) document.getElementById('checkedBy').value = savedName;
    }

    function openCamera() {
      alert("Integrasi kamera siap ditambahkan.");
    }

    let typingTimer;
    const doneTypingInterval = 500;

    function lookupSKU(barcodeValue) {
      const skuInput = document.getElementById('sku');
      const btnSimpan = document.getElementById('btnSimpan');
      const btnRequest = document.getElementById('btnRequest');
      
      clearTimeout(typingTimer);
      
      if (barcodeValue.trim().length > 0) {
        skuInput.value = "Mencari SKU..."; 
        
        btnSimpan.style.display = "block";
        btnRequest.style.display = "none";
        
        typingTimer = setTimeout(() => {
          fetchSKUFromGAS(barcodeValue.trim());
        }, doneTypingInterval);
      } else {
        skuInput.value = ""; 
        btnSimpan.style.display = "block";
        btnRequest.style.display = "none";
      }
    }

    async function fetchSKUFromGAS(barcode) {
      const skuInput = document.getElementById('sku');
      const btnSimpan = document.getElementById('btnSimpan');
      const btnRequest = document.getElementById('btnRequest');
      
      try {
        const response = await fetch(`${SCRIPT_URL}?barcode=${encodeURIComponent(barcode)}`);
        const result = await response.json();
        
        if (result.status === "success") {
          skuInput.value = result.sku;
          btnSimpan.style.display = "block";
          btnRequest.style.display = "none";
        } else if (result.status === "not_found") {
          skuInput.value = result.sku; 
          btnSimpan.style.display = "none";
          btnRequest.style.display = "block";
        } else {
          skuInput.value = "Error sistem";
        }
      } catch (error) {
        console.error("Gagal mengambil data SKU:", error);
        skuInput.value = "Gagal terhubung ke server";
      }
    }

    async function simpanData() {
      const barcode = document.getElementById('barcode').value;
      const sku = document.getElementById('sku').value;
      const expDate = document.getElementById('expDate').value;
      const qty = document.getElementById('qty').value;
      const checkedBy = document.getElementById('checkedBy').value;

      if(!barcode || !qty || !checkedBy || !expDate) {
        alert("Barcode, Tanggal Exp, QTY, dan Checked By wajib diisi!");
        return;
      }
      
      if(sku === "Mencari SKU..." || sku === "SKU TIDAK DITEMUKAN" || sku === "Gagal terhubung ke server" || sku === "") {
        alert("Pastikan Barcode valid dan SKU telah ditemukan sebelum menyimpan!");
        return;
      }

      localStorage.setItem('inbound_checker_name', checkedBy);

      const payload = {
        barcode: barcode,
        sku: sku,
        expDate: expDate,
        qty: qty,
        checkedBy: checkedBy
      };

      const btn = document.getElementById('btnSimpan');
      btn.innerText = "MENYIMPAN...";
      btn.disabled = true;

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8', 
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if(result.status === "success") {
          document.getElementById('barcode').value = '';
          document.getElementById('sku').value = '';
          document.getElementById('expDate').value = '';
          document.getElementById('qty').value = '';
          document.getElementById('barcode').focus(); 
        } else {
          alert("Gagal menyimpan data: " + result.message);
        }
      } catch (error) {
        alert("Terjadi kesalahan koneksi saat mengirim data.");
        console.error(error);
      } finally {
        btn.innerText = "SIMPAN";
        btn.disabled = false;
      }
    }

    async function requestUpdate() {
      const barcode = document.getElementById('barcode').value;
      const expDate = document.getElementById('expDate').value;
      const qty = document.getElementById('qty').value;
      const checkedBy = document.getElementById('checkedBy').value;

      if(!barcode || !qty || !checkedBy || !expDate) {
        alert("Barcode, Tanggal Exp, QTY, dan Checked By tetap wajib diisi untuk Request!");
        return;
      }

      const btn = document.getElementById('btnRequest');
      btn.innerText = "MENGIRIM...";
      btn.disabled = true;

      const payload = {
        barcode: barcode,
        sku: "", 
        expDate: expDate,
        qty: qty,
        checkedBy: checkedBy
      };

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8', 
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if(result.status === "success") {
          alert("Berhasil! Data masuk ke Sheet dan menunggu update SKU dari Admin.");
          document.getElementById('barcode').value = '';
          document.getElementById('sku').value = '';
          document.getElementById('expDate').value = '';
          document.getElementById('qty').value = '';
          document.getElementById('barcode').focus();
          
          document.getElementById('btnSimpan').style.display = "block";
          btn.style.display = "none";
        } else {
          alert("Gagal mengirim request: " + result.message);
        }
      } catch (error) {
        alert("Terjadi kesalahan koneksi.");
        console.error(error);
      } finally {
        btn.innerText = "REQUEST UPDATE DATA";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
