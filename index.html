<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Inbound Scanner</title>
  
  <style>
    /* Tema Putih Clean */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #ffffff;
      color: #333333;
      display: flex;
      justify-content: center;
      padding: 30px 20px;
      margin: 0;
    }

    .container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    label {
      font-size: 1rem;
      margin-bottom: 8px;
      color: #111111;
      font-weight: 500;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 14px;
      background-color: #f5f5f5; 
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      color: #333333;
      font-size: 1rem;
      text-align: center;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }

    input::placeholder {
      color: #a0a0a0;
    }

    input:focus {
      border-color: #999999;
      background-color: #ffffff;
    }

    .barcode-group {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 15px;
      width: 100%;
    }

    .barcode-group input {
      border-radius: 20px;
      flex: 1;
    }

    .camera-btn {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: #555555;
      padding: 0;
      display: flex;
      align-items: center;
      transition: transform 0.2s;
    }

    .camera-btn:hover {
      transform: scale(1.1);
      color: #000000;
    }

    .row-2 {
      display: flex;
      gap: 15px;
      width: 100%;
    }

    .row-2 .form-group {
      flex: 1;
    }

    .readonly-input {
      background-color: #ebebeb;
      color: #666666;
      cursor: not-allowed;
    }

    /* Gaya Tombol Umum */
    button.action-btn {
      width: 100%;
      padding: 14px;
      background-color: #9e9e9e; 
      border: none;
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      transition: background-color 0.2s, opacity 0.2s;
      margin-top: 5px;
    }

    button.action-btn:hover {
      background-color: #888888;
    }

    button.action-btn:active {
      opacity: 0.8;
    }

    button.action-btn:disabled {
      background-color: #cccccc;
      color: #7a7a7a;
      cursor: not-allowed;
    }

    /* Gaya Khusus Tombol Request Update (Warna Gelap) */
    button.request-btn {
      background-color: #333333;
    }
    button.request-btn:hover {
      background-color: #111111;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- BARCODE & CAMERA -->
    <div class="form-group">
      <label>BARCODE</label>
      <div class="barcode-group">
        <input type="text" id="barcode" placeholder="" oninput="lookupSKU(this.value)">
        <button class="camera-btn" onclick="openCamera()" title="Buka Kamera">📷</button>
      </div>
    </div>

    <!-- SKU PRODUK -->
    <div class="form-group">
      <input type="text" id="sku" class="readonly-input" placeholder="SKU PRODUK" readonly>
    </div>

    <!-- TANGGAL EXP & QTY -->
    <div class="row-2">
      <div class="form-group">
        <label>TANGGAL EXP</label>
        <input type="date" id="expDate">
      </div>
      <div class="form-group">
        <label>QTY</label>
        <input type="number" id="qty" placeholder="INPUT QTY">
      </div>
    </div>

    <!-- CHECKED BY -->
    <div class="form-group">
      <label>Checked by</label>
      <input type="text" id="checkedBy" placeholder="INPUT NAMA">
    </div>

    <!-- BUTTONS (Sekarang numpuk di satu tempat dan bergantian muncul) -->
    <div style="margin-top: 15px;">
      <button class="action-btn" id="btnSimpan" onclick="simpanData()">SIMPAN</button>
      <button class="action-btn request-btn" id="btnRequest" onclick="requestUpdate()" style="display: none;">REQUEST UPDATE DATA</button>
    </div>

  </div>

  <script>
    // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT DI SINI
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyFnAt_k_cKbY0lHxyDAHnxxLHdpzCGDDTmz99BLhOa3y3B7do9XOHflh3qPjbo9z2mRQ/exec';

    window.onload = function() {
      const savedName = localStorage.getItem('inbound_checker_name');
      if(savedName) document.getElementById('checkedBy').value = savedName;
    }

    function openCamera() {
      alert("Integrasi kamera siap ditambahkan.");
    }

    let typingTimer;
    const doneTypingInterval = 500;

    function lookupSKU(barcodeValue) {
      const skuInput = document.getElementById('sku');
      const btnSimpan = document.getElementById('btnSimpan');
      const btnRequest = document.getElementById('btnRequest');
      
      clearTimeout(typingTimer);
      
      if (barcodeValue.trim().length > 0) {
        skuInput.value = "Mencari SKU..."; 
        
        // Reset tampilan tombol ke awal selama proses mencari
        btnSimpan.style.display = "block";
        btnRequest.style.display = "none";
        
        typingTimer = setTimeout(() => {
          fetchSKUFromGAS(barcodeValue.trim());
        }, doneTypingInterval);
      } else {
        skuInput.value = ""; 
        btnSimpan.style.display = "block";
        btnRequest.style.display = "none";
      }
    }

    async function fetchSKUFromGAS(barcode) {
      const skuInput = document.getElementById('sku');
      const btnSimpan = document.getElementById('btnSimpan');
      const btnRequest = document.getElementById('btnRequest');
      
      try {
        const response = await fetch(`${SCRIPT_URL}?barcode=${encodeURIComponent(barcode)}`);
        const result = await response.json();
        
        if (result.status === "success") {
          skuInput.value = result.sku;
          // SKU Ketemu: Munculkan SIMPAN, Sembunyikan REQUEST
          btnSimpan.style.display = "block";
          btnRequest.style.display = "none";
        } else if (result.status === "not_found") {
          skuInput.value = result.sku; 
          // SKU Gak Ketemu: Sembunyikan SIMPAN, Munculkan REQUEST
          btnSimpan.style.display = "none";
          btnRequest.style.display = "block";
        } else {
          skuInput.value = "Error sistem";
        }
      } catch (error) {
        console.error("Gagal mengambil data SKU:", error);
        skuInput.value = "Gagal terhubung ke server";
      }
    }

    async function simpanData() {
      const barcode = document.getElementById('barcode').value;
      const sku = document.getElementById('sku').value;
      const expDate = document.getElementById('expDate').value;
      const qty = document.getElementById('qty').value;
      const checkedBy = document.getElementById('checkedBy').value;

      if(!barcode || !qty || !checkedBy || !expDate) {
        alert("Barcode, Tanggal Exp, QTY, dan Checked By wajib diisi!");
        return;
      }
      
      if(sku === "Mencari SKU..." || sku === "SKU TIDAK DITEMUKAN" || sku === "Gagal terhubung ke server" || sku === "") {
        alert("Pastikan Barcode valid dan SKU telah ditemukan sebelum menyimpan!");
        return;
      }

      localStorage.setItem('inbound_checker_name', checkedBy);

      const payload = {
        barcode: barcode,
        sku: sku,
        expDate: expDate,
        qty: qty,
        checkedBy: checkedBy
      };

      const btn = document.getElementById('btnSimpan');
      btn.innerText = "MENYIMPAN...";
      btn.disabled = true;

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8', 
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if(result.status === "success") {
          document.getElementById('barcode').value = '';
          document.getElementById('sku').value = '';
          document.getElementById('expDate').value = '';
          document.getElementById('qty').value = '';
          document.getElementById('barcode').focus(); 
        } else {
          alert("Gagal menyimpan data: " + result.message);
        }
      } catch (error) {
        alert("Terjadi kesalahan koneksi saat mengirim data.");
        console.error(error);
      } finally {
        btn.innerText = "SIMPAN";
        btn.disabled = false;
      }
    }

    // Fungsi Request Update yang baru
    async function requestUpdate() {
      const barcode = document.getElementById('barcode').value;
      const expDate = document.getElementById('expDate').value;
      const qty = document.getElementById('qty').value;
      const checkedBy = document.getElementById('checkedBy').value;

      // Tetap validasi data lain agar tidak kosong
      if(!barcode || !qty || !checkedBy || !expDate) {
        alert("Barcode, Tanggal Exp, QTY, dan Checked By tetap wajib diisi untuk Request!");
        return;
      }

      const btn = document.getElementById('btnRequest');
      btn.innerText = "MENGIRIM REQUEST...";
      btn.disabled = true;

      // Payload disiapkan, perhatikan bagian SKU sengaja dikirim string kosong ""
      const payload = {
        barcode: barcode,
        sku: "", 
        expDate: expDate,
        qty: qty,
        checkedBy: checkedBy
      };

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8', 
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if(result.status === "success") {
          alert("Berhasil! Data masuk ke Sheet dan menunggu update SKU dari Admin.");
          // Bersihkan form
          document.getElementById('barcode').value = '';
          document.getElementById('sku').value = '';
          document.getElementById('expDate').value = '';
          document.getElementById('qty').value = '';
          document.getElementById('barcode').focus();
          
          // Kembalikan tampilan ke tombol Simpan
          document.getElementById('btnSimpan').style.display = "block";
          btn.style.display = "none";
        } else {
          alert("Gagal mengirim request: " + result.message);
        }
      } catch (error) {
        alert("Terjadi kesalahan koneksi.");
        console.error(error);
      } finally {
        btn.innerText = "REQUEST UPDATE DATA";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
