<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Inbound Scanner</title>
  
  <link rel="stylesheet" href="style.css">
  <!-- Library Kamera -->
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

  <!-- MODAL KAMERA (Awalnya Disembunyikan) -->
  <div id="camera-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
      <button class="close-btn" onclick="closeCamera()">TUTUP KAMERA</button>
      <div id="qr-reader" style="width: 100%;"></div>
    </div>
  </div>

  <div class="container">
    
    <!-- PILIH CABANG -->
    <div class="form-group">
      <label>LOKASI CABANG</label>
      <select id="cabang" class="styled-select">
        <option value="BOGOR">BOGOR</option>
        <option value="JAKARTA">JAKARTA</option>
        <option value="PLM">PALEMBANG</option>
      </select>
    </div>

    <!-- BARCODE & CAMERA -->
    <div class="form-group">
      <label>BARCODE</label>
      <div class="barcode-group">
        <input type="text" id="barcode" placeholder="" oninput="lookupSKU(this.value)">
        <!-- Tombol ini sekarang memanggil fungsi buka kamera -->
        <button class="camera-btn" onclick="openCamera()" title="Buka Kamera">📷</button>
      </div>
    </div>

    <!-- SKU PRODUK -->
    <div class="form-group">
      <input type="text" id="sku" class="readonly-input" placeholder="SKU PRODUK" readonly>
    </div>

    <!-- TANGGAL EXP & QTY -->
    <div class="row-2">
      <div class="form-group">
        <label>TANGGAL EXP</label>
        <input type="date" id="expDate">
      </div>
      <div class="form-group">
        <label>QTY</label>
        <input type="number" id="qty" placeholder="INPUT QTY">
      </div>
    </div>

    <!-- CHECKED BY -->
    <div class="form-group">
      <label>Checked by</label>
      <input type="text" id="checkedBy" placeholder="INPUT NAMA">
    </div>

    <!-- BUTTONS -->
    <div style="margin-top: 10px;">
      <button class="action-btn" id="btnSimpan" onclick="simpanData()">SIMPAN</button>
      <button class="action-btn request-btn" id="btnRequest" onclick="requestUpdate()" style="display: none;">REQUEST UPDATE DATA</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
