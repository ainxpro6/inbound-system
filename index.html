<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Inbound Scanner</title>
  
  <!-- Menghubungkan file CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    
	<!-- PILIH CABANG -->
    <div class="form-group">
      <label>LOKASI CABANG</label>
      <select id="cabang" class="styled-select">
        <option value="BOGOR">BOGOR</option>
        <option value="JAKARTA">JAKARTA</option>
        <option value="PLM">PALEMBANG</option>
      </select>
    </div>
	
    <!-- BARCODE & CAMERA -->
    <div class="form-group">
      <label>BARCODE</label>
      <div class="barcode-group">
        <input type="text" id="barcode" placeholder="" oninput="lookupSKU(this.value)">
        <button class="camera-btn" onclick="openCamera()" title="Buka Kamera">📷</button>
      </div>
    </div>

    <!-- SKU PRODUK -->
    <div class="form-group">
      <input type="text" id="sku" class="readonly-input" placeholder="SKU PRODUK HASIL DARI BARCODE" readonly>
    </div>

    <!-- TANGGAL EXP & QTY -->
    <div class="row-2">
      <div class="form-group">
        <label>TANGGAL EXP</label>
        <input type="date" id="expDate">
      </div>
      <div class="form-group">
        <label>QTY</label>
        <input type="number" id="qty" placeholder="INPUT QTY">
      </div>
    </div>

    <!-- CHECKED BY -->
    <div class="form-group">
      <label>Checked by</label>
      <input type="text" id="checkedBy" placeholder="INPUT NAMA">
    </div>

    <!-- BUTTONS -->
    <div style="margin-top: 10px;">
      <button class="action-btn" id="btnSimpan" onclick="simpanData()">SIMPAN</button>
      <button class="action-btn request-btn" id="btnRequest" onclick="requestUpdate()" style="display: none;">REQUEST UPDATE DATA</button>
    </div>

  </div>

  <!-- Menghubungkan file JavaScript -->
  <script src="script.js"></script>
</body>
</html>
